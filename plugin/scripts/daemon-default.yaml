# MetaMe Daemon Configuration
# Generated by: metame daemon init

telegram:
  enabled: false
  bot_token: null
  admin_chat_id: null
  allowed_chat_ids: []

feishu:
  enabled: false
  app_id: null
  app_secret: null
  admin_chat_id: null
  allowed_chat_ids: []
  remote_dispatch:
    enabled: false
    self: ""
    chat_id: ""
    secret: ""

weixin:
  enabled: false
  base_url: "https://ilinkai.weixin.qq.com"
  bot_type: "3"
  account_id: ""
  route_tag: null
  allowed_chat_ids: []
  chat_agent_map: {}
  poll_timeout_ms: 35000

projects:
  # Per-project heartbeat tasks. Each project's tasks are isolated and
  # notifications arrive as colored Feishu cards (visually distinct).
  #
  # example_project:
  #   name: "My Project"
  #   icon: "🎬"
  #   color: "orange"        # blue|orange|green|red|grey|purple|turquoise
  #   heartbeat_tasks:
  #     - name: "daily-task"
  #       cwd: "~/AGI/MyProject"
  #       model: "sonnet"
  #       at: "09:30"         # fixed local time (HH:MM)
  #       days: "weekdays"    # optional: weekdays | weekends | [mon, tue, ...]
  #       notify: true
  #       enabled: true
  #       prompt: "..."
  #       allowedTools: [Read, Write, WebSearch]

heartbeat:
  tasks:
    # 认知蒸馏：有偏好信号才触发，4小时冷却，一次处理所有 batch
    - name: cognitive-distill
      type: script
      command: node ~/.metame/distill.js
      interval: 4h
      precondition: "test -s ~/.metame/raw_signals.jsonl"
      require_idle: true
      notify: false
      enabled: true

    # 记忆提取：扫描未分析 session，提取长期事实和会话标签，4小时冷却
    - name: memory-extract
      type: script
      command: node ~/.metame/memory-extract.js
      interval: 4h
      timeout: 1800
      require_idle: true
      notify: false
      enabled: true

    # 记忆垃圾回收：每天 02:00 清理过期/重复记忆
    - name: memory-gc
      type: script
      command: node ~/.metame/memory-gc.js
      at: "02:00"
      require_idle: true
      notify: false
      enabled: true

    # 技能演化：有技能信号才触发，12小时冷却，仅在用户闲置时执行
    - name: skill-evolve
      type: script
      command: node ~/.metame/skill-evolution.js
      interval: 12h
      precondition: "test -s ~/.metame/skill_signals.jsonl"
      require_idle: true
      notify: false
      enabled: true

    # 自我反思：每天 23:00 扫描纠错信号，提炼成长模式
    - name: self-reflect
      type: script
      command: node ~/.metame/self-reflect.js
      at: "23:00"
      require_idle: true
      notify: false
      enabled: true

    # 夜间记忆蒸馏：每天 01:00 提炼热区事实为决策与经验文档
    - name: nightly-reflect
      type: script
      command: node ~/.metame/memory-nightly-reflect.js
      at: "01:00"
      require_idle: true
      notify: false
      enabled: true

    # wiki-sync: 每天 02:30 把所有 wiki 页面（记忆主题、doc/cluster 页、decisions/lessons）同步到 Obsidian vault
    # 前置条件: daemon.wiki_output_dir 已配置，如: ~/Documents/ObsidianVault/MetaMe/wiki
    - name: wiki-sync
      type: script
      command: >-
        node -e "
        const path=require('path'),os=require('os');
        const {DatabaseSync}=require('node:sqlite');
        const {runWikiReflect}=require(path.join(os.homedir(),'.metame','wiki-reflect'));
        const providers=require(path.join(os.homedir(),'.metame','providers'));
        const db=new DatabaseSync(path.join(os.homedir(),'.metame','memory.db'));
        const outDir=path.join(os.homedir(),'Documents/ObsidianVault/MetaMe/wiki');
        runWikiReflect(db,{providers,outputDir:outDir}).then(r=>{
          console.log('wiki-sync done',JSON.stringify(r));db.close();
        }).catch(e=>{console.error(e.message);db.close();process.exit(1);});
        "
      at: "02:30"
      require_idle: true
      notify: false
      enabled: false  # set to true after verifying wiki_output_dir is correct

    # 记忆索引：每天 01:30 更新 ~/.metame/memory/INDEX.md
    - name: memory-index
      type: script
      command: node ~/.metame/memory-index.js
      at: "01:30"
      require_idle: true
      notify: false
      enabled: true

    # Embedding 索引：消费 embedding_queue，生成向量嵌入，30 分钟冷却
    - name: embedding-index
      type: script
      command: node ~/.metame/daemon-embedding.js
      interval: 30m
      timeout: 600
      require_idle: false
      notify: false
      enabled: true

    # Legacy flat tasks (no project isolation). New tasks should go under projects: above.
    # Examples — uncomment or add your own:
    #
    # Scheduled task (calls claude -p with your profile context):
    # - name: "morning-news"
    #   prompt: "抓取今天的AI领域重要新闻，整理成3条摘要，中英双语。"
    #   at: "09:00"         # 每天本地时间 09:00
    #   days: "weekdays"    # 可选，不填表示每天
    #   model: "haiku"
    #   notify: true
    #
    # - name: "weekly-review"
    #   prompt: "基于我的profile，生成本周个人成长回顾和下周建议。"
    #   at: "20:30"
    #   days: [sun]
    #   model: "haiku"
    #   notify: true
    #
    # Script task (runs a local script directly, no claude -p):
    # - name: "distill"
    #   type: "script"
    #   command: "node ~/.metame/distill.js"
    #   interval: "6h"
    #   precondition: "test -s ~/.metame/raw_signals.jsonl"
    #   notify: false
    #
    # Skill evolution cold path (independent of cognitive distill):
    # - name: "skill-evolve"
    #   type: "script"
    #   command: "node ~/.metame/skill-evolution.js"
    #   interval: "6h"
    #   precondition: "test -s ~/.metame/skill_signals.jsonl"
    #   notify: false
    #
    # Scheduling:
    # - interval: "6h"  -> run every 6 hours (legacy + fully supported)
    # - at: "HH:MM"     -> run at fixed local time, optional days filter
    #
    # precondition: shell command, empty output → skip (zero tokens)
    # type: "script" → runs command directly instead of claude -p

budget:
  daily_limit: 50000
  warning_threshold: 0.8

daemon:
  model: sonnet  # sonnet, opus, haiku — model for mobile sessions
  log_max_size: 1048576
  wiki_output_dir: ~/Documents/ObsidianVault/MetaMe/wiki  # Obsidian vault wiki subdirectory
  heartbeat_check_interval: 60
  # Skip all permission prompts for mobile sessions (full access)
  # Mobile users can't click "allow" — so we pre-authorize everything.
  # Security relies on allowed_chat_ids whitelist, not tool restrictions.
  dangerously_skip_permissions: true
  mentor:
    enabled: false
    friction_level: 3
    mode: gentle
    exclude_agents: [personal, xianyu]
    emotion_keywords_extra: []
  # Cross-session memory recall channel (v4.1 §4 PR2)
  # Default off — opt in per workspace once observe-only audit data
  # confirms healthy trigger / wiki_dropped / router_reason metrics.
  memory_recall_enabled: false           # opt-in flag — when true, daemon
                                         # injects assembled recall context
                                         # into prompt and writes phase=inject
                                         # rows to recall_audit table.
  memory_recall_max_chars: 4000          # recallHint budget cap (chars)
  memory_recall_assemble_timeout_ms: 80  # max wait for assembleRecallContext;
                                         # on timeout daemon proceeds with no
                                         # recallHint and writes outcome=harmful
                                         # to recall_audit (observation-only).
  memory_recall_show_marker: true        # internal-testing default; flip to
                                         # false after 4 weeks per v4.1 §P1.16
                                         # (PR2 ship engineer owns the flip)
  memory_recall_marker_channel: 'card'   # 'card' (Feishu footer card) | 'off'
  memory_recall_audit_retention_days: 45 # nightly memory-gc prunes recall_audit
                                         # rows older than N days. 45 covers
                                         # the 4-week observation window plus
                                         # a buffer for analysis before the
                                         # show_marker flip (v4.1 §P1.16).
