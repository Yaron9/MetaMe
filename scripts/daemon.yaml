heartbeat:
  tasks:
    - name: cognitive-distill
      type: script
      command: node ~/.metame/distill.js
      interval: 2h
      precondition: test -s ~/.metame/raw_signals.jsonl
      require_idle: true
      notify: false
      enabled: true
    - name: memory-extract
      type: script
      command: node ~/.metame/memory-extract.js
      interval: 12h
      timeout: 1800
      require_idle: true
      notify: false
      enabled: true
    - name: memory-gc
      type: script
      command: node ~/.metame/memory-gc.js
      at: '02:00'
      require_idle: true
      notify: false
      enabled: true
    - name: skill-evolve
      type: script
      command: node ~/.metame/skill-evolution.js
      interval: 24h
      precondition: test -s ~/.metame/skill_signals.jsonl
      require_idle: true
      notify: false
      enabled: true
    - name: self-reflect
      type: script
      command: node ~/.metame/self-reflect.js
      at: '23:00'
      require_idle: true
      notify: false
      enabled: true
    - name: nightly-reflect
      type: script
      command: node ~/.metame/memory-nightly-reflect.js
      at: '01:00'
      require_idle: true
      notify: false
      enabled: true
    - name: memory-index
      type: script
      command: node ~/.metame/memory-index.js
      at: '01:30'
      require_idle: true
      notify: false
      enabled: true
budget:
  daily_limit: 100000
  warning_threshold: 0.8
daemon:
  model: opus
  log_max_size: 1048576
  heartbeat_check_interval: 60
  skill_evolution_notify: false
  dangerously_skip_permissions: true
  session_allowed_tools:
